<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuickTap Admin - Finance Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #D32F2F; --bg: #F8F9FA; --success: #2E7D32; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg); padding: 15px; }
        .container { max-width: 950px; margin: auto; background: white; border-radius: 15px; box-shadow: 0 5px 25px rgba(0,0,0,0.1); border-top: 6px solid var(--primary); padding: 20px; }
        h1 { color: var(--primary); text-align: center; font-size: 22px; margin-bottom: 20px; }
        
        /* Global Settings UI */
        .config-box { background: #FFF9F9; padding: 15px; border-radius: 12px; margin-bottom: 20px; border: 1px solid #FFE5E5; }
        .config-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; }
        input { padding: 10px; border: 1px solid #DDD; border-radius: 8px; font-size: 13px; outline: none; }
        .btn-main { background: var(--primary); color: white; border: none; padding: 12px; width: 100%; border-radius: 10px; font-weight: 800; cursor: pointer; margin-top: 10px; }

        /* Table UI */
        .table-box { overflow-x: auto; margin-top: 10px; }
        table { width: 100%; border-collapse: collapse; min-width: 600px; }
        th { text-align: left; padding: 12px; color: #888; font-size: 11px; text-transform: uppercase; border-bottom: 2px solid #EEE; }
        td { padding: 15px 12px; border-bottom: 1px solid #FAFAFA; font-size: 14px; }
        .btn-act { background: var(--success); color: white; border: none; padding: 8px 15px; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .btn-blk { background: #444; color: white; border: none; padding: 8px 15px; border-radius: 6px; cursor: pointer; margin-left: 5px; }
        .badge { padding: 4px 10px; border-radius: 12px; font-size: 10px; font-weight: bold; text-transform: uppercase; }
        .pending { background: #FFF3E0; color: #F57C00; }
        .active { background: #E8F5E9; color: var(--success); }
    </style>
</head>
<body>

<div class="container">
    <h1>QUICKTAP CLOUD MASTER</h1>

    <!-- 1. LIVE APP CONFIGURATION -->
    <div class="config-box">
        <label style="font-size: 11px; font-weight: 800; color: #666;">LIVE APP SETTINGS (UPI & PRICING)</label>
        <div class="config-grid" style="margin-top: 8px;">
            <input type="text" id="admin_upi" placeholder="UPI ID (suraj@upi)">
            <input type="number" id="p1" placeholder="Daily ₹">
            <input type="number" id="p2" placeholder="Weekly ₹">
            <input type="number" id="p3" placeholder="Monthly ₹">
        </div>
        <button class="btn-main" onclick="saveConfig()">SYNC SETTINGS TO APP</button>
    </div>

    <!-- 2. DRIVER LIST -->
    <div class="table-box">
        <h3 style="font-size: 14px; margin-bottom: 10px;">Driver Requests</h3>
        <table>
            <thead><tr><th>Driver / ID</th><th>Status</th><th>Hrs</th><th>Actions</th></tr></thead>
            <tbody id="userList"></tbody>
        </table>
        <div id="loader" style="text-align:center; padding:30px; color: #D32F2F;">CONNECTING TO CLOUD...</div>
    </div>
</div>

<script>
    const DB_ROOT = "https://finance-pro-a58ef-default-rtdb.firebaseio.com";

    async function loadData() {
        try {
            // Load Current Settings
            const confRes = await fetch(`${DB_ROOT}/app_settings.json`);
            const conf = await confRes.json();
            if(conf) {
                document.getElementById('admin_upi').value = conf.upi || "";
                document.getElementById('p1').value = conf.p1 || "50";
                document.getElementById('p2').value = conf.p2 || "300";
                document.getElementById('p3').value = conf.p3 || "1000";
            }

            // Load User Requests
            const userRes = await fetch(`${DB_ROOT}/users.json`);
            const users = await userRes.json();
            const list = document.getElementById('userList');
            document.getElementById('loader').style.display = "none";
            list.innerHTML = "";

            if (!users) {
                list.innerHTML = "<tr><td colspan='4' style='text-align:center; padding:20px;'>No requests yet.</td></tr>";
                return;
            }

            for (let id in users) {
                let u = users[id];
                let timeInfo = u.status === 'active' ? `<br><small style="color:#666">${Math.floor((u.expiry - Date.now())/3600000)}h left</small>` : "";
                
                list.innerHTML += `
                    <tr>
                        <td><b>${u.name}</b><br><small style="color:#999">${id}</small></td>
                        <td><span class="badge ${u.status}">${u.status}</span>${timeInfo}</td>
                        <td><input type="number" id="hrs_${id}" value="24" style="width:45px; padding:5px;"></td>
                        <td>
                            <button class="btn-act" onclick="updateStatus('${id}', 'active')">OK</button>
                            <button class="btn-blk" onclick="updateStatus('${id}', 'blocked')">X</button>
                        </td>
                    </tr>`;
            }
        } catch (e) { console.log("Cloud Error"); }
    }

    async function saveConfig() {
        const settings = {
            upi: document.getElementById('admin_upi').value,
            p1: document.getElementById('p1').value,
            p2: document.getElementById('p2').value,
            p3: document.getElementById('p3').value
        };
        await fetch(`${DB_ROOT}/app_settings.json`, { method: 'PUT', body: JSON.stringify(settings) });
        alert("App Settings Updated!");
    }

    async function updateStatus(id, s) {
        const hrs = document.getElementById('hrs_'+id).value || 24;
        const exp = Date.now() + (hrs * 3600 * 1000);
        await fetch(`${DB_ROOT}/users/${id}.json`, {
            method: 'PATCH', body: JSON.stringify({ status: s, expiry: exp })
        });
        alert("Driver Status Updated!");
        loadData();
    }

    setInterval(loadData, 7000); // 7s auto refresh
    loadData();
</script>
</body>
</html>
