<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuickTap - Cloud Admin Control</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #D32F2F; --dark: #1A1A1A; --bg: #F5F5F5; --success: #2E7D32; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg); padding: 20px; }
        .container { max-width: 900px; margin: auto; background: white; border-radius: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); border-top: 6px solid var(--primary); }
        .header { padding: 30px; text-align: center; border-bottom: 1px solid #EEE; }
        .header h1 { color: var(--primary); font-size: 24px; font-weight: 800; }
        .table-box { padding: 20px; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; min-width: 600px; }
        th { text-align: left; padding: 15px; color: #666; font-size: 12px; border-bottom: 2px solid #EEE; }
        td { padding: 15px; border-bottom: 1px solid #FAFAFA; font-size: 14px; }
        .badge { padding: 5px 12px; border-radius: 20px; font-size: 11px; font-weight: 800; }
        .active { background: #E8F5E9; color: var(--success); }
        .pending { background: #FFF3E0; color: #F57C00; }
        input[type="number"] { width: 55px; padding: 8px; border-radius: 8px; border: 1px solid #DDD; text-align: center; }
        .btn { border: none; padding: 10px 15px; border-radius: 10px; font-weight: 800; cursor: pointer; color: white; margin-right: 5px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>QUICKTAP ADMIN PANEL</h1>
        <p>Finance Pro - Cloud Driver Management</p>
    </div>

    <div class="table-box">
        <table>
            <thead>
                <tr><th>Driver Name</th><th>Status</th><th>Set Access (Hrs)</th><th>Action</th></tr>
            </thead>
            <tbody id="list"></tbody>
        </table>
        <div id="loader" style="text-align:center; padding:30px;">Loading Database...</div>
    </div>
</div>

<script>
    // URL AUTOMATICALLY SET BY SYSTEM
    const DB_URL = "https://finance-pro-a58ef-default-rtdb.firebaseio.com/users.json";

    async function load() {
        const res = await fetch(DB_URL);
        const data = await res.json();
        const list = document.getElementById('list');
        document.getElementById('loader').style.display = "none";
        list.innerHTML = "";

        if(!data) return;

        for (let id in data) {
            let u = data[id];
            let remaining = "";
            if(u.status === 'active') {
                let diff = u.expiry - Date.now();
                remaining = diff > 0 ? `(${Math.floor(diff/3600000)}h left)` : "(Expired)";
            }

            list.innerHTML += `
                <tr>
                    <td><b>${u.name}</b><br><small>ID: ${id}</small></td>
                    <td><span class="badge ${u.status}">${u.status.toUpperCase()}</span><br><small>${remaining}</small></td>
                    <td><input type="number" id="h_${id}" value="24"></td>
                    <td>
                        <button class="btn" style="background:var(--success)" onclick="act('${id}','active')">ACTIVATE</button>
                        <button class="btn" style="background:#444" onclick="act('${id}','blocked')">BLOCK</button>
                    </td>
                </tr>`;
        }
    }

    async function act(id, s) {
        const h = document.getElementById('h_'+id).value;
        const exp = Date.now() + (h * 3600 * 1000);
        await fetch(DB_URL.replace('.json', `/${id}.json`), {
            method: 'PATCH', body: JSON.stringify({status: s, expiry: exp})
        });
        alert("Done!"); load();
    }
    setInterval(load, 8000); load();
</script>
</body>
</html>
