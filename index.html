<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuickTap Admin - Finance Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@500;700;800&display=swap" rel="stylesheet">
    <style>
        :root { 
            --primary: #E53935; 
            --primary-hover: #C62828;
            --bg: #F4F6F8; 
            --surface: #FFFFFF;
            --success: #10B981; 
            --success-bg: #E6F4EA;
            --danger: #EF4444;
            --danger-bg: #FEE2E2;
            --text-main: #1F2937;
            --text-muted: #6B7280;
            --border: #E5E7EB;
            --sidebar-width: 260px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: var(--text-main); display: flex; min-height: 100vh; }

        /* --- SIDEBAR --- */
        .sidebar {
            width: var(--sidebar-width); background: #111827; color: #FFFFFF; padding: 30px 20px;
            display: flex; flex-direction: column; position: fixed; height: 100vh; left: 0; top: 0; z-index: 100;
        }
        .sidebar-brand {
            font-family: 'Plus Jakarta Sans', sans-serif; font-size: 18px; font-weight: 800; letter-spacing: 0.5px;
            color: #FFFFFF; margin-bottom: 40px; display: flex; align-items: center; gap: 8px;
        }
        .sidebar-brand span { color: var(--primary); }
        .menu-list { list-style: none; display: flex; flex-direction: column; gap: 8px; }
        .menu-item {
            padding: 12px 16px; border-radius: 10px; cursor: pointer; font-size: 14px; font-weight: 600;
            color: #9CA3AF; transition: all 0.2s ease; display: flex; align-items: center; gap: 10px;
        }
        .menu-item:hover { background: #1F2937; color: #FFFFFF; }
        .menu-item.active { background: var(--primary); color: #FFFFFF; }

        /* --- MAIN CONTENT --- */
        .main-content { margin-left: var(--sidebar-width); flex-grow: 1; padding: 40px; max-width: 1100px; width: calc(100% - var(--sidebar-width)); }
        .page-section { display: none; animation: fadeIn 0.3s ease-in-out; }
        .page-section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .page-title { font-family: 'Plus Jakarta Sans', sans-serif; font-size: 24px; font-weight: 800; margin-bottom: 25px; color: var(--text-main); }

        /* --- COMPONENTS --- */
        .card { background: var(--surface); border-radius: 16px; padding: 30px; border: 1px solid var(--border); box-shadow: 0 4px 20px rgba(0,0,0,0.02); }
        .config-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; }
        .input-group { display: flex; flex-direction: column; gap: 8px; }
        .input-group label { font-size: 12px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }
        input { padding: 14px 16px; border: 1px solid var(--border); border-radius: 10px; font-size: 14px; outline: none; transition: all 0.2s ease; font-weight: 500; }
        input:focus { border-color: var(--primary); box-shadow: 0 0 0 4px rgba(229, 57, 53, 0.1); }
        .btn-main { background: var(--primary); color: white; border: none; padding: 14px; width: 100%; border-radius: 10px; font-weight: 700; font-size: 14px; cursor: pointer; margin-top: 25px; box-shadow: 0 4px 12px rgba(229, 57, 53, 0.2); }

        /* --- PREMIUM TABLE & SWITCHES --- */
        .table-box { overflow-x: auto; border: 1px solid var(--border); border-radius: 14px; background: #FFFFFF; }
        table { width: 100%; border-collapse: collapse; min-width: 700px; }
        th { text-align: left; padding: 16px; color: var(--text-muted); font-size: 11px; text-transform: uppercase; font-weight: 700; border-bottom: 1px solid var(--border); background: #FAFAFA; }
        td { padding: 18px 16px; border-bottom: 1px solid var(--border); font-size: 14px; vertical-align: middle; }
        tr:hover td { background-color: #FBFBFC; }

        .badge { padding: 6px 12px; border-radius: 20px; font-size: 11px; font-weight: 700; text-transform: uppercase; display: inline-block; }
        .pending { background: #FEF3C7; color: #D97706; }
        .active { background: var(--success-bg); color: var(--success); }
        .blocked { background: var(--danger-bg); color: var(--danger); }
        .plan-badge { background: #E0F2FE; color: #0369A1; padding: 4px 10px; border-radius: 6px; font-weight: 600; font-size: 12px; text-transform: capitalize; }

        /* --- MODERN SWITCH STYLING --- */
        .action-flex { display: flex; gap: 20px; align-items: center; }
        .switch-wrapper { display: flex; align-items: center; gap: 8px; font-size: 12px; font-weight: 600; color: var(--text-muted); }
        
        .switch { position: relative; display: inline-block; width: 44px; height: 24px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #D1D5DB; transition: .3s; border-radius: 24px; }
        .slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 3px; bottom: 3px; background-color: white; transition: .3s; border-radius: 50%; }
        
        /* Green Activate Switch */
        .switch-approve input:checked + .slider { background-color: var(--success); }
        .switch-approve input:checked + .slider:before { transform: translateX(20px); }
        
        /* Red Block Switch */
        .switch-block input:checked + .slider { background-color: var(--danger); }
        .switch-block input:checked + .slider:before { transform: translateX(20px); }

        #loader { font-weight: 600; font-size: 14px; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 0.6; } 50% { opacity: 1; } }

        @media (max-width: 768px) {
            body { flex-direction: column; }
            .sidebar { width: 100%; height: auto; position: relative; padding: 20px; }
            .sidebar-brand { margin-bottom: 20px; }
            .main-content { margin-left: 0; width: 100%; padding: 20px; }
        }
    </style>
</head>
<body>

<!-- SIDEBAR MENU -->
<div class="sidebar">
    <div class="sidebar-brand">QUICKTAP <span>CLOUD</span></div>
    <ul class="menu-list">
        <li class="menu-item active" onclick="switchPage('config-page', this)">⚙️ App Settings</li>
        <li class="menu-item" onclick="switchPage('drivers-page', this)">🚗 Driver Requests</li>
    </ul>
</div>

<!-- MAIN CONTENT -->
<div class="main-content">

    <!-- PAGE 1: APP SETTINGS -->
    <div id="config-page" class="page-section active">
        <h2 class="page-title">Live App Settings</h2>
        <div class="card">
            <div class="config-grid">
                <div class="input-group"><label>UPI ID (Admin)</label><input type="text" id="admin_upi" placeholder="suraj@upi"></div>
                <div class="input-group"><label>Daily Price (₹)</label><input type="number" id="p1" placeholder="50"></div>
                <div class="input-group"><label>Weekly Price (₹)</label><input type="number" id="p2" placeholder="300"></div>
                <div class="input-group"><label>Monthly Price (₹)</label><input type="number" id="p3" placeholder="1000"></div>
            </div>
            <button class="btn-main" onclick="saveConfig()">SYNC SETTINGS TO LIVE APP</button>
        </div>
    </div>

    <!-- PAGE 2: DRIVER MANAGEMENT -->
    <div id="drivers-page" class="page-section">
        <h2 class="page-title">Driver Requests Management</h2>
        <div class="table-box">
            <table>
                <thead>
                    <tr>
                        <th>Driver / ID</th>
                        <th>Status</th>
                        <th>Selected Plan</th>
                        <th>Actions (Toggle Status)</th>
                    </tr>
                </thead>
                <tbody id="userList"></tbody>
            </table>
            <div id="loader" style="text-align:center; padding:40px; color: var(--primary);">CONNECTING TO CLOUD DB...</div>
        </div>
    </div>
</div>

<script>
    const DB_ROOT = "https://finance-pro-a58ef-default-rtdb.firebaseio.com";

    function switchPage(pageId, element) {
        document.querySelectorAll('.page-section').forEach(s => s.classList.remove('active'));
        document.getElementById(pageId).classList.add('active');
        document.querySelectorAll('.menu-item').forEach(i => i.classList.remove('active'));
        element.classList.add('active');
    }

    async function loadData() {
        try {
            // Configuration Setup
            const confRes = await fetch(`${DB_ROOT}/app_settings.json`);
            const conf = await confRes.json();
            if(conf) {
                document.getElementById('admin_upi').value = conf.upi || "";
                document.getElementById('p1').value = conf.p1 || "50";
                document.getElementById('p2').value = conf.p2 || "300";
                document.getElementById('p3').value = conf.p3 || "1000";
            }

            // Driver Users Setup
            const userRes = await fetch(`${DB_ROOT}/users.json`);
            const users = await userRes.json();
            const list = document.getElementById('userList');
            document.getElementById('loader').style.display = "none";
            list.innerHTML = "";

            if (!users) {
                list.innerHTML = "<tr><td colspan='4' style='text-align:center; padding:30px; color:#6B7280;'>No requests found.</td></tr>";
                return;
            }

            const now = Date.now();

            for (let id in users) {
                let u = users[id];
                let currentStatus = u.status || 'pending';
                let selectedPlan = u.plan || 'daily';

                // AUTOMATIC EXPIRE CHECK: टाइम पूरा होने पर 0 सेकंड में ऑटो-ब्लॉक
                if (u.expiry && now > u.expiry && currentStatus === 'active') {
                    currentStatus = 'blocked';
                    await fetch(`${DB_ROOT}/users/${id}.json`, {
                        method: 'PATCH', body: JSON.stringify({ status: 'blocked' })
                    });
                }

                let timeInfo = currentStatus === 'active' ? `<br><small style="color:var(--text-muted); display:inline-block; margin-top:4px;">⏳ ${Math.max(0, Math.floor((u.expiry - now)/3600000))}h left</small>` : "";
                
                let approveChecked = currentStatus === 'active' ? 'checked' : '';
                let blockChecked = currentStatus === 'blocked' ? 'checked' : '';

                list.innerHTML += `
                    <tr>
                        <td>
                            <span style="font-weight:600; color:var(--text-main); font-size:15px;">${u.name}</span><br>
                            <small style="color:var(--text-muted); font-family:monospace; background:#F3F4F6; padding:2px 6px; border-radius:4px; display:inline-block; margin-top:4px;">${id}</small>
                        </td>
                        <td><span class="badge ${currentStatus}">${currentStatus}</span>${timeInfo}</td>
                        <td><span class="plan-badge">${selectedPlan}</span></td>
                        <td>
                            <div class="action-flex">
                                <div class="switch-wrapper">
                                    <span>Activate</span>
                                    <label class="switch switch-approve">
                                        <input type="checkbox" ${approveChecked} onchange="handleToggle('${id}', 'active', '${selectedPlan}', this)">
                                        <span class="slider"></span>
                                    </label>
                                </div>
                                <div class="switch-wrapper">
                                    <span>Block</span>
                                    <label class="switch switch-block">
                                        <input type="checkbox" ${blockChecked} onchange="handleToggle('${id}', 'blocked', '${selectedPlan}', this)">
                                        <span class="slider"></span>
                                    </label>
                                </div>
                            </div>
                        </td>
                    </tr>`;
            }
        } catch (e) { console.log("Cloud Error"); }
    }

    // MANUAL INSTANT TOGGLE FUNCTION (सिर्फ आपके क्लिक करने पर काम करेगा)
    async function handleToggle(id, targetStatus, plan, element) {
        // अगर यूजर स्विच ऑफ करने की कोशिश करे तो एक्शन न लें, सीधे पुराना डेटा रीलोड करें
        if (!element.checked) {
            loadData(); 
            return;
        }

        let days = 1; 
        
        // प्लान के मुताबिक दिनों की सटीक गणना
        if (plan && typeof plan === 'string') {
            let p = plan.toLowerCase().trim();
            if (p === 'weekly') days = 15;
            else if (p === 'monthly') days = 30;
            else days = 1; // Default daily
        }

        // एक्टिवेट करने पर टाइम सेट होगा, ब्लॉक करने पर 0 हो जाएगा
        const expiryTimestamp = targetStatus === 'active' ? Date.now() + (days * 24 * 60 * 60 * 1000) : 0;

        // 0 सेकंड रिस्पॉन्स के साथ डायरेक्ट डेटाबेस अपडेट
        try {
            await fetch(`${DB_ROOT}/users/${id}.json`, {
                method: 'PATCH', 
                body: JSON.stringify({ 
                    status: targetStatus, 
                    expiry: expiryTimestamp 
                })
            });
            loadData(); // अपडेट के तुरंत बाद इंटरफ़ेस सिंक करें
        } catch (err) {
            console.log("Update Error: ", err);
        }
    }

    async function saveConfig() {
        const settings = {
            upi: document.getElementById('admin_upi').value,
            p1: document.getElementById('p1').value,
            p2: document.getElementById('p2').value,
            p3: document.getElementById('p3').value
        };
        await fetch(`${DB_ROOT}/app_settings.json`, { method: 'PUT', body: JSON.stringify(settings) });
        alert("App Settings Updated Successfully!");
    }

    setInterval(loadData, 7000); // 7 सेकंड में बैकग्राउंड रिफ्रेश और ऑटो-एक्सपायरी चेक
    loadData();
</script>
</body>
</html>
